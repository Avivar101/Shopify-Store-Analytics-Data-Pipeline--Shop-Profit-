version: 2

models:
    - name: stg_shopify_customers
      description: "Staging model for customers data."
      columns:
        - name: customer_id
          description: "Unique identifier for each customer."
          data_tests:
            - not_null
            - unique
        - name: first_name
          description: "Customer's first name."
        - name: last_name
          description: "Customer's last name."
        - name: email
          description: "Customer's email address."
        - name: created_at
          description: "Timestamp when the customer record was created."
    - name: stg_shopify_orders
      description: "Staging model for orders data."
      columns:
        - name: order_id
          description: "Unique identifier for each order."
          data_tests:
            - not_null
            - unique
        - name: shop_domain
          description: "Domain of the shop where the order was placed."
          data_tests:
            - not_null
        - name: updated_at
          description: "Timestamp when the order record was last updated."
          data_tests:
            - not_null
        - name: financial_status
          description: "Financial status of the order."
          data_tests:
            - accepted_values:
                arguments:
                  values: ['paid', 'pending', 'refunded', 'voided']
        - name: fulfillment_status
          description: "Fulfillment status of the order."
          data_tests:
            - accepted_values:
                arguments:
                  values: ['fulfilled', 'partial', 'unfulfilled']
    - name: stg_shopify_order_items
      description: "Staging model for order items data."
      columns:
        - name: order_item_id
          description: "Unique identifier for each order item."
          data_tests:
            - not_null
            - unique
        - name: order_id
          description: "Identifier for the order to which the item belongs."
          data_tests:
            - not_null
        - name: product_id
          description: "Identifier for the product associated with the order item."
          data_tests:
            - not_null
        - name: quantity
          description: "Quantity of the product ordered."
          data_tests:
            - not_null
    - name: stg_shopify_products
      description: "Staging model for products data."
      columns:
        - name: shop_domain
          description: "Domain of the shop to which the product belongs."
          data_tests:
            - not_null
        - name: product_id
          description: "Unique identifier for each product."
          data_tests:
            - not_null
            - unique
        - name: title
          description: "Title of the product."
        - name: vendor
          description: "Vendor of the product."
        - name: created_at
          description: "Timestamp when the product record was created."
    - name: stg_shopify_variants
      description: "Staging model for product variants data."
      columns:
        - name: shop_domain
          description: "Domain of the shop to which the variant belongs."
          data_tests:
            - not_null
        - name: variant_id
          description: "Unique identifier for each product variant."
          data_tests:
            - not_null
            - unique
        - name: product_id
          description: "Identifier for the product to which the variant belongs."
          data_tests:
            - not_null
        - name: title
          description: "Title of the product variant."
        - name: price
          description: "Price of the product variant."