services:
  dagster:
    build: .
    container_name: shop_profit_dagster
    env_file:
      - .env
    ports:
      - "3000:3000"
    volumes:
      - ./:/app
      - ./db:/app/db
      - ./dagster_home:/app/.dagster
    working_dir: /app
    command: ["uv", "run", "dagster", "dev", "-h", "0.0.0.0", "-p", "3000", "-m", "orchestration.definitions"]

  metabase:
    image: metabase/metabase:latest
    container_name: shop_profit_metabase
    ports:
      - "3001:3000"
    volumes:
      - metabase_data:/metabase-data

volumes:
  metabase_data: